name: Weekly AI Report

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync latest main
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Call AI for Weekly Report
        run: |
          RAW_RESPONSE=$(curl -sS -X POST "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -d '{
              "body": "{\"task\":\"weekly\",\"username\":\"mdsarfarazalam840\",\"repository\":\"'${GITHUB_REPOSITORY}'\"}",
              "async": true
            }')
      
          EXECUTION_ID=$(echo "$RAW_RESPONSE" | jq -r '.["$id"]')
      
          for i in {1..24}; do
            RESPONSE=$(curl -sS "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions/$EXECUTION_ID" \
              -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
              -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}")
      
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
      
            BODY_READY=$(echo "$RESPONSE" | jq -r '
              if (
                (.responseBody and (.responseBody | type == "string") and (.responseBody != "")) or
                (.response and (.response | type == "string") and (.response != ""))
              ) then
                "yes"
              else
                "no"
              end
            ')
            
            if [ "$STATUS" = "completed" ] && [ "$BODY_READY" = "yes" ]; then
              echo "$RESPONSE" | jq -r '
                def parsed:
                  if (.responseBody and (.responseBody | type == "string") and (.responseBody != "")) then
                    (.responseBody | fromjson? // {})
                  elif (.response and (.response | type == "string") and (.response != "")) then
                    (.response | fromjson? // {})
                  else
                    {}
                  end;
      
                parsed as $body
                | if ($body.ok == true and $body.insights and ($body.insights | type == "string") and ($body.insights != "")) then
                    $body.insights
                  else
                    empty
                  end
              ' > weekly.md
              break
            fi
      
            sleep 5
          done
      
          if [ ! -s weekly.md ]; then
            echo "No weekly AI report available." > weekly.md
          fi

      - name: Debug Weekly Output
        run: |
          echo "===== weekly.md ====="
          cat weekly.md
          
      - name: Inject Weekly Report
        run: |
          awk -v start="<!-- WEEKLY_REPORT_START -->" \
              -v end="<!-- WEEKLY_REPORT_END -->" \
              -v file="weekly.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add README.md
          git commit -m "📊 Weekly AI report" || echo "No changes"
          git push
