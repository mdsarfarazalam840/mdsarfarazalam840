name: Weekly AI Report

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call AI for Weekly Report
        run: |
          curl -s -X POST "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -d '{
              "body": "{\"task\":\"weekly\",\"username\":\"mdsarfarazalam840\"}"
            }' \
            | jq -r '
                if (.responseBody and (.responseBody | type == "string")) then
                  (.responseBody | fromjson | .insights // "No weekly AI report available.")
                else
                  "No weekly AI report available."
                end
              ' > weekly.md

      - name: Inject Weekly Report
        run: |
          awk -v start="<!-- WEEKLY_REPORT_START -->" \
              -v end="<!-- WEEKLY_REPORT_END -->" \
              -v file="weekly.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "📊 Weekly AI report" || echo "No changes"
          git push
