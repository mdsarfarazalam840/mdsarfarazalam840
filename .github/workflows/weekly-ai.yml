name: Weekly AI Report

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Call AI for Weekly Report
        run: |
          curl -s -X POST https://ai-agentrouter.onrender.com/route \
            -H "Content-Type: application/json" \
            -d '{"task":"weekly","username":"mdsarfarazalam840"}' \
            > weekly.md

      - name: Inject Weekly Report
        run: |
          awk -v start="<!-- WEEKLY_REPORT_START -->" \
              -v end="<!-- WEEKLY_REPORT_END -->" \
              -v file="weekly.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "📊 Weekly AI report" || echo "No changes"
          git push
