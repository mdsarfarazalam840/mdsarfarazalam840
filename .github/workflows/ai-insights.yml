name: AI Insights Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Wake up server (avoid cold start)
        run: |
          curl -s https://ai-agentrouter.onrender.com > /dev/null
          sleep 10

      - name: Call AI for Suggestions
        run: |
          curl -s -X POST https://ai-agentrouter.onrender.com/route \
            -H "Content-Type: application/json" \
            -d '{"task":"review","username":"mdsarfarazalam840"}' \
            > suggestions.md

      - name: Call AI for Improvements
        run: |
          curl -s -X POST https://ai-agentrouter.onrender.com/route \
            -H "Content-Type: application/json" \
            -d '{"task":"improve","username":"mdsarfarazalam840"}' \
            > improvements.md

          echo "$RESPONSE" > ai_output.md

      - name: Inject Suggestions
        run: |
          awk -v start="<!-- AI_SUGGESTIONS_START -->" \
              -v end="<!-- AI_SUGGESTIONS_END -->" \
              -v file="suggestions.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Inject Improvements
        run: |
          awk -v start="<!-- AI_IMPROVEMENTS_START -->" \
              -v end="<!-- AI_IMPROVEMENTS_END -->" \
              -v file="improvements.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "🤖 Update AI Insights" || echo "No changes"
          git push
