name: AI Insights Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call AI for Suggestions
        run: |
          RAW_RESPONSE=$(curl -sS -X POST "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -d '{
              "body": "{\"task\":\"review\",\"username\":\"mdsarfarazalam840\"}",
              "async": true
            }')
      
          EXECUTION_ID=$(echo "$RAW_RESPONSE" | jq -r '.["$id"]')
      
          for i in {1..24}; do
            RESPONSE=$(curl -sS "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions/$EXECUTION_ID" \
              -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
              -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}")
      
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
      
            if [ "$STATUS" = "completed" ]; then
              echo "$RESPONSE" | jq -r '
                (.responseBody | fromjson? // {}) as $body
                | if ($body.ok == true and $body.insights and ($body.insights != "")) then
                    $body.insights
                  else
                    "No AI suggestions available."
                  end
              ' > suggestions.md
              break
            fi
      
            sleep 5
          done
      
          if [ ! -s suggestions.md ]; then
            echo "No AI suggestions available." > suggestions.md
          fi

      - name: Call AI for Improvements
        run: |
          RAW_RESPONSE=$(curl -sS -X POST "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            -d '{
              "body": "{\"task\":\"improve\",\"username\":\"mdsarfarazalam840\"}",
              "async": true
            }')
      
          EXECUTION_ID=$(echo "$RAW_RESPONSE" | jq -r '.["$id"]')
      
          for i in {1..24}; do
            RESPONSE=$(curl -sS "${{ secrets.APPWRITE_ENDPOINT }}/v1/functions/${{ secrets.APPWRITE_PROFILE_FUNCTION_ID }}/executions/$EXECUTION_ID" \
              -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
              -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}")
      
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
      
            if [ "$STATUS" = "completed" ]; then
              echo "$RESPONSE" | jq -r '
                (.responseBody | fromjson? // {}) as $body
                | if ($body.ok == true and $body.insights and ($body.insights != "")) then
                    $body.insights
                  else
                    "No AI improvements available."
                  end
              ' > improvements.md
              break
            fi
      
            sleep 5
          done
      
          if [ ! -s improvements.md ]; then
            echo "No AI improvements available." > improvements.md
          fi

      - name: Debug Suggestions Output
        run: |
          echo "===== suggestions.md ====="
          cat suggestions.md

      - name: Inject Suggestions
        run: |
          awk -v start="<!-- AI_SUGGESTIONS_START -->" \
              -v end="<!-- AI_SUGGESTIONS_END -->" \
              -v file="suggestions.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Debug Improvements Output
        run: |
          echo "===== improvements.md ====="
          cat improvements.md

      - name: Inject Improvements
        run: |
          awk -v start="<!-- AI_IMPROVEMENTS_START -->" \
              -v end="<!-- AI_IMPROVEMENTS_END -->" \
              -v file="improvements.md" '
          BEGIN {inside=0}
          {
            if ($0 ~ start) {
              print
              while ((getline line < file) > 0) print line
              inside=1
              next
            }
            if ($0 ~ end) {
              inside=0
            }
            if (!inside) print
          }
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "🤖 Update AI Insights" || echo "No changes"
          git push
